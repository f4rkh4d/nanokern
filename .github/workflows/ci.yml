name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-and-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: install toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y nasm qemu-system-x86 netcat-openbsd python3

      - name: build
        run: make CC=gcc LD=ld OBJCOPY=objcopy

      - name: smoke (boot + scheduler fairness)
        run: make smoke CC=gcc LD=ld OBJCOPY=objcopy
